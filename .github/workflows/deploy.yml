name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/core
      - run: npm run build -w packages/web
      - run: cp feedback-lx/index.html packages/web/dist/feedback-lx.html
      - run: cp feedback-lx/The_Feedback_Gap.mp4 packages/web/dist/The_Feedback_Gap.mp4
      - uses: actions/upload-pages-artifact@v4
        with:
          path: packages/web/dist
      - id: deployment
        uses: actions/deploy-pages@v4
